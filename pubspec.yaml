name: chrnet
description: ChrNet VPN - secure and fast VPN client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # QR Code scanner
  mobile_scanner: ^5.0.0

  # HTTP for subscriptions
  http: ^1.2.0

  # Permissions
  permission_handler: ^11.3.0

  # Icons
  cupertino_icons: ^1.0.6

  # URL launcher
  url_launcher: ^6.2.5
  country_flags: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/images/
